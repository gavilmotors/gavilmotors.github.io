<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAVIL MOTORS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ============================================================
           PUBLICIDAD EMERGENTE PREMIUM - ESTILO CÓMIC ANIMADO 
           ============================================================ */
        .promo-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92); /* Fondo súper oscuro */
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 100000;
            padding: 10px;
            backdrop-filter: blur(5px); /* Desenfoque de fondo */
        }

        .promo-content {
            background: #d32f2f; /* Rojo Gavil Motors */
            border-radius: 25px;
            position: relative;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(211, 47, 47, 0.5);
            border: 6px solid #000; /* Borde grueso estilo cómic */
            overflow: visible; /* Para que los elementos decorativos salgan */
            animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        /* Botón cerrar gigante y muy visible */
        .promo-close-btn {
            position: absolute;
            top: -20px;
            right: -20px;
            background: #000;
            color: #fff;
            border: 4px solid #fff;
            width: 55px;
            height: 55px;
            cursor: pointer;
            font-size: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: 0.3s;
        }
        .promo-close-btn:hover { background: #ff1744; transform: rotate(90deg) scale(1.1); }

        .promo-header {
            background: #000;
            color: #fff;
            padding: 20px 10px;
            border-top-left-radius: 19px;
            border-top-right-radius: 19px;
            border-bottom: 5px solid #fff;
        }

        .promo-header h2 {
            font-size: 1.4rem;
            margin: 0;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .promo-body {
            padding: 30px 20px;
            color: #fff;
            position: relative;
        }

        /* Iconos animados estilo dibujo */
        .promo-icon-car {
            font-size: 4rem;
            color: #ffeb3b;
            margin-bottom: 10px;
            animation: carMove 2s infinite ease-in-out;
            display: inline-block;
        }

        .promo-body h3 {
            font-size: 2rem;
            color: #ffeb3b; /* Amarillo vibrante */
            margin: 0 0 15px 0;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1;
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
        }

        .promo-body p {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 25px;
            text-transform: uppercase;
            background: #000;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 10px;
        }

        /* La placa de PRECIOS FIJOS */
        .promo-badge-fixed {
            background: #fff;
            color: #d32f2f;
            padding: 15px;
            font-size: 1.6rem;
            font-weight: 900;
            border-radius: 15px;
            display: block;
            border: 4px solid #000;
            transform: rotate(-3deg);
            box-shadow: 5px 5px 0 rgba(0,0,0,0.3);
            margin-bottom: 25px;
        }

        /* Botón de acción grande y verde */
        .btn-entendido {
            background: #2e7d32; /* Verde */
            color: white;
            border: 4px solid #fff;
            padding: 18px 30px;
            font-size: 1.3rem;
            border-radius: 15px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            box-shadow: 0 6px 0 #1b5e20;
            transition: 0.1s;
        }
        .btn-entendido:active { transform: translateY(4px); box-shadow: 0 2px 0 #1b5e20; }

        /* ==============================
           ANIMACIONES
           ============================== */
        
        /* Entrada del anuncio (rebote) */
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 1; transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        /* Movimiento del coche (balanceo y brillo) */
        @keyframes carMove {
            0% { transform: translateX(-10px) rotate(-5deg); filter: drop-shadow(0 0 0 rgba(255,235,59,0)); }
            50% { transform: translateX(10px) rotate(5deg); filter: drop-shadow(0 0 15px rgba(255,235,59,1)); }
            100% { transform: translateX(-10px) rotate(-5deg); filter: drop-shadow(0 0 0 rgba(255,235,59,0)); }
        }

        /* Ajustes para móviles */
        @media (max-width: 480px) {
            .promo-content { width: 95%; max-width: none; }
            .promo-body h3 { font-size: 1.6rem; }
            .promo-body p { font-size: 1.1rem; }
            .promo-badge-fixed { font-size: 1.3rem; }
            .promo-close-btn { width: 45px; height: 45px; font-size: 22px; top: -15px; right: -15px; }
        }
    </style>
</head>
<body>

    <div id="promo-utilidades" class="promo-overlay">
        <div class="promo-content">
            <button class="promo-close-btn" onclick="cerrarPromo()" title="Cerrar ventana">
                <i class="bi bi-x-lg"></i>
            </button>

            <div class="promo-header">
                <h2>AQUÍ EN GAVILMOTORS</h2>
            </div>

            <div class="promo-body">
                <i class="fas fa-car-side promo-icon-car"></i>
                
                <h3>¡FIN DE SEMANA DE UTILIDADES!</h3>
                <p>¡TODOS LOS VEHÍCULOS BAJARON DE PRECIO!</p>
                
                <span class="promo-badge-fixed">
                    <i class="fas fa-lock"></i> ¡ESTE 18 Y 19 DE ABRIL!
                </span>

                <button class="btn-entendido" onclick="cerrarPromo()">¡PRESIONA AQUÍ PARA ENTRAR!</button>
            </div>
        </div>
    </div>

    <div class="wrapper">
        <header class="header-mobile">
            <h1 class="logo">GAVIL MOTORS</h1>
            <div class="selecciona-texto">
                <span>MOSTRAR VENDIDOS</span>
                <i class="fas fa-hand-point-right"></i>
            </div>
            <button class="open-menu" id="open-menu">
                <i class="bi bi-list"></i>
            </button>
        </header>

        <aside>
            <button class="close-menu" id="close-menu">
                <i class="bi bi-x"></i>
            </button>
            <header>
                <nav class="navbar-desktop">
                    <div class="logo">
                        <img src="logo/logo-gavilmotors.PNG" alt="Gavil Motors Logo">
                    </div>
                    <ul>
                        <li><a href="../GAVILMOTORS.html" class="active">Inicio</a></li>
                    </ul>
                </nav>
            </header>

            <ul class="menu">
                <li><button id="todos" class="boton-menu boton-categoria active"><i class="bi bi-hand-index-thumb-fill"></i> Todos los productos</button></li>
                <li><button id="VEHÍCULOS VENDIDOS" class="boton-menu boton-categoria"><i class="bi bi-hand-index-thumb"></i> VEHÍCULOS VENDIDOS</button></li>
                <li><button id="VEHÍCULOS CHOCADOS" class="boton-menu boton-categoria"><i class="bi bi-hand-index-thumb"></i> VEHÍCULO CHOCADOS</button></li>
                <li><button id="chevrolet" class="boton-menu boton-categoria"><i class="bi bi-hand-index-thumb"></i> CHEVROLET</button></li>
                <li><button id="hyundai" class="boton-menu boton-categoria"><i class="bi bi-hand-index-thumb"></i> HYUNDAI</button></li>
            </ul>

            <footer>
                <p class="texto-footer">© 2025 GAVIL MOTORS</p>
            </footer>
        </aside>

        <main>
            <h2 class="titulo-principal" id="titulo-principal">Todos los productos</h2>
            <div class="buscador">
                <input type="text" id="buscador" placeholder="Buscar productos...">
                <button id="boton-buscar"><i class="bi bi-search"></i> Buscar</button>
            </div>
            <div id="contenedor-productos" class="contenedor-productos">
                </div>
        </main>
    </div>

    <script>
        // Lógica de la Publicidad
        window.onload = function() {
            // Muestra la publicidad 0.5 segundos después de cargar
            setTimeout(() => {
                const promo = document.getElementById('promo-utilidades');
                if (promo) {
                    promo.style.display = 'flex';
                }
            }, 500);
        };

        function cerrarPromo() {
            document.getElementById('promo-utilidades').style.display = 'none';
        }

        // Tus funciones originales de Modal
        function mostrarModal(modalId) {
            const modal = document.getElementById(`modal-${modalId}`);
            if (modal) modal.style.display = "flex";
        }

        function cerrarModal(modalId) {
            const modal = document.getElementById(`modal-${modalId}`);
            if (modal) modal.style.display = "none";
        }

        // Cerrar al hacer clic fuera
        window.onclick = function (event) {
            if (event.target.id === "promo-utilidades") {
                cerrarPromo();
            }
        };
    </script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="./js/main.js"></script>
    <script src="./js/menu.js"></script>
</body>
</html>
